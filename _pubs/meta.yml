# =============================================================================
# Publications sidecar metadata.
#
# The .bib file (publications.bib) is the GROUND TRUTH. It is parsed exactly
# as-is: authors, title, year, venue string, and paper url all come from there.
# This file adds ONLY the things bibtex does not hold:
#   - venue_aliases: map long venue strings -> compact display names
#   - tags:          topical tags per paper (citekey -> [tag, ...])
#   - links:         EXTRA links per paper (poster/slides/code/webpage/video...)
#                    the "paper" link is taken from the bib `url`/`pdf` field.
#   - notes:         optional free-text note shown under an entry
#                    (e.g. "originally presented at IAI @ NeurIPS 2024 (Oral)")
#   - section:       optional grouping ("published" default, or "preprint")
#
# Nothing here overrides bibtex. If it's in the bib, don't repeat it here.
# =============================================================================

# ---------------------------------------------------------------------------
# Tag legend: defines the emoji + human label for every tag id used below.
# The widget renders these as clickable chips (emoji + label) and filters on them.
# ---------------------------------------------------------------------------
tag_legend:
  all:          { emoji: "🗣️", label: "LLMs/NLP" }
  mechinterp:   { emoji: "🔎", label: "(mechanistic) interpretability" }
  causal:       { emoji: "🔨", label: "causality" }
  ood:          { emoji: "🗺️", label: "out-of-distribution" }
  eval:         { emoji: "📏", label: "evaluation + benchmarking" }
  multimodal:   { emoji: "👁️", label: "multimodality" }
  sim:          { emoji: "🎭", label: "simulation" }
  edu:          { emoji: "🎓", label: "AI for education" }
  cogsci:       { emoji: "🧠", label: "cognitive science" }
  socsci:       { emoji: "🌐", label: "social science" }
  datasci:      { emoji: "📊", label: "data science" }
  synth:        { emoji: "🖼️", label: "synthetic data" }
  theory:       { emoji: "💭", label: "theory" }

# ---------------------------------------------------------------------------
# Venue aliases: map the (long) venue string from the bib to a compact label.
# Matching is done on the resolved venue string (booktitle/journal). Both exact
# strings and case-insensitive substring keys are supported (see build script).
# Value is the compact display label.
# ---------------------------------------------------------------------------
venue_aliases:
  # conferences
  "Neural Information Processing Systems": "NeurIPS"
  "International Conference on Machine Learning": "ICML"
  "AAAI": "AAAI"
  "Conference on Language Modeling": "COLM"
  "Platform for Advanced Scientific Computing": "PASC"
  "International Joint Conference on Natural Language Processing": "IJCNLP-AACL"

  # journals
  "Journal of Artificial Intelligence Research": "JAIR"
  "Frontiers in Artificial Intelligence": "Frontiers in AI"
  "Journal of Computational Social Science": "JCSS"

  # workshops (1-off matches)
  "NeurIPS 2024 Workshop on Interpretable AI": "IAI @ NeurIPS 2024"
  "ICLR 2025 Workshop on Human-AI Coevolution": "HAIC @ ICLR 2025"
  "First Workshop on Social Simulation with LLMs": "SocialSim @ COLM 2025"

  # preprints
  "arXiv": "arXiv"

  # dissertation
  "University of Illinois Urbana-Champaign": "Dissertation (UIUC)"

# ---------------------------------------------------------------------------
# Per-paper metadata, keyed by bibtex citekey.
#   tags:    list of tag ids (must exist in tag_legend)
#   links:   list of {type, url}; `type` maps to an icon in the widget config.
#            (the primary paper link is auto-added from the bib url/pdf)
#   notes:   optional string shown under the row
#   section: "published" (default) | "preprint"
# ---------------------------------------------------------------------------
